<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at 20% 30%, #2a0050, transparent 40%),
                radial-gradient(circle at 80% 70%, #4b0082, transparent 40%),
                radial-gradient(circle at 50% 50%, #000000, #0a0014 80%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    position: relative;
}
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.15;
    animation: starsMove 60s linear infinite;
}
body::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(160,32,240,0.25), transparent 60%);
    filter: blur(80px);
    animation: smokeMove 20s ease-in-out infinite alternate;
}

@keyframes starsMove {
    from { transform: translate(0,0); }
    to { transform: translate(-200px, -300px); }
}

@keyframes smokeMove {
    from { transform: translate(-50px, -50px) scale(1); }
    to { transform: translate(50px, 50px) scale(1.2); }
}
.container {
    text-align: center;
    width: 90%;
    max-width: 350px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    background: rgba(20, 0, 40, 0.6);
    box-shadow: 
        0 0 20px #a020f055,
        0 0 40px #6a00ff33;
    position: relative;
    z-index: 1;
}
.profile img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid #a020f0;
    margin-bottom: 10px;
    box-shadow: 0 0 15px #a020f0aa;
}

.profile h1 {
    font-size: 22px;
    margin-bottom: 5px;
}

.profile p {
    font-size: 14px;
    color: #bbb;
    margin-bottom: 20px;
}

/* Links */
.link {
    display: block;
    text-decoration: none;
    color: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    background: rgba(30, 0, 60, 0.6);
    border: 1px solid #f3f6f4;
    transition: 0.3s;
    box-shadow: 0 0 10px #6a00ff22;
}

.link:hover {
    background: linear-gradient(45deg, #a020f0, #6a00ff);
    transform: scale(1.05);
    box-shadow: 
        0 0 15px #a020f0,
        0 0 25px #6a00ff;
}
</style>
